<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  
  <!-- Background -->
  <rect width="800" height="600" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    Database-Free Peptide Identification via Categorical Partitioning
  </text>
  
  <!-- Step 1: MS/MS Spectrum Input -->
  <g id="step1">
    <rect x="50" y="80" width="180" height="120" rx="10" fill="#e8f4f8" stroke="#3498db" stroke-width="2"/>
    <text x="140" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      MS/MS Spectrum
    </text>
    
    <!-- Simple spectrum visualization -->
    <line x1="70" y1="170" x2="210" y2="170" stroke="#34495e" stroke-width="1"/>
    <line x1="70" y1="170" x2="70" y2="120" stroke="#34495e" stroke-width="1"/>
    
    <!-- Peaks -->
    <line x1="90" y1="170" x2="90" y2="145" stroke="#e74c3c" stroke-width="2"/>
    <line x1="110" y1="170" x2="110" y2="130" stroke="#e74c3c" stroke-width="2"/>
    <line x1="130" y1="170" x2="130" y2="155" stroke="#e74c3c" stroke-width="2"/>
    <line x1="150" y1="170" x2="150" y2="125" stroke="#e74c3c" stroke-width="2"/>
    <line x1="170" y1="170" x2="170" y2="140" stroke="#e74c3c" stroke-width="2"/>
    <line x1="190" y1="170" x2="190" y2="150" stroke="#e74c3c" stroke-width="2"/>
    
    <text x="140" y="190" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#7f8c8d">
      m/z →
    </text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 240 140 L 290 140" stroke="#95a5a6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="265" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">
    Map
  </text>
  
  <!-- Step 2: S-Entropy Coordinates -->
  <g id="step2">
    <rect x="300" y="80" width="180" height="120" rx="10" fill="#fef5e7" stroke="#f39c12" stroke-width="2"/>
    <text x="390" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      S-Entropy Space
    </text>
    
    <!-- 3D coordinate system -->
    <line x1="340" y1="170" x2="440" y2="170" stroke="#34495e" stroke-width="1"/>
    <line x1="340" y1="170" x2="340" y2="130" stroke="#34495e" stroke-width="1"/>
    <line x1="340" y1="170" x2="320" y2="155" stroke="#34495e" stroke-width="1"/>
    
    <!-- Axes labels -->
    <text x="445" y="173" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Sₖ</text>
    <text x="335" y="125" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Sₜ</text>
    <text x="310" y="153" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Sₑ</text>
    
    <!-- Point cloud -->
    <circle cx="370" cy="155" r="3" fill="#e74c3c" opacity="0.7"/>
    <circle cx="385" cy="145" r="3" fill="#e74c3c" opacity="0.7"/>
    <circle cx="400" cy="160" r="3" fill="#e74c3c" opacity="0.7"/>
    <circle cx="415" cy="150" r="3" fill="#e74c3c" opacity="0.7"/>
    <circle cx="360" cy="165" r="3" fill="#3498db" opacity="0.7"/>
    <circle cx="395" cy="135" r="3" fill="#3498db" opacity="0.7"/>
    <circle cx="420" cy="155" r="3" fill="#3498db" opacity="0.7"/>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 490 140 L 540 140" stroke="#95a5a6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="515" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">
    Encode
  </text>
  
  <!-- Step 3: Thermodynamic Droplets -->
  <g id="step3">
    <rect x="550" y="80" width="180" height="120" rx="10" fill="#ebf5fb" stroke="#5dade2" stroke-width="2"/>
    <text x="640" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      Droplet Waves
    </text>
    
    <!-- Wave pattern -->
    <path d="M 570 150 Q 590 135, 610 150 T 650 150 T 690 150 T 710 150" 
          stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M 570 165 Q 590 155, 610 165 T 650 165 T 690 165 T 710 165" 
          stroke="#e74c3c" stroke-width="2" fill="none"/>
    
    <!-- Droplets -->
    <circle cx="590" cy="150" r="8" fill="#3498db" opacity="0.3"/>
    <circle cx="630" cy="150" r="8" fill="#3498db" opacity="0.3"/>
    <circle cx="670" cy="150" r="8" fill="#3498db" opacity="0.3"/>
    <circle cx="610" cy="165" r="6" fill="#e74c3c" opacity="0.3"/>
    <circle cx="650" cy="165" r="6" fill="#e74c3c" opacity="0.3"/>
  </g>
  
  <!-- Arrow down from Step 1 -->
  <path d="M 140 210 L 140 260" stroke="#95a5a6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: Hierarchical Constraints -->
  <g id="step4">
    <rect x="50" y="270" width="180" height="140" rx="10" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
    <text x="140" y="295" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      Hierarchical
    </text>
    <text x="140" y="312" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      Constraints
    </text>
    
    <!-- Constraint list -->
    <text x="70" y="335" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">✓ Spatial containment</text>
    <text x="70" y="352" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">✓ Wavelength hierarchy</text>
    <text x="70" y="369" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">✓ Energy conservation</text>
    <text x="70" y="386" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">✓ Phase coherence</text>
    <text x="70" y="403" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">✓ Charge redistribution</text>
  </g>
  
  <!-- Arrow down from Step 3 -->
  <path d="M 640 210 L 640 260" stroke="#95a5a6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 5: Fragmentation Network -->
  <g id="step5">
    <rect x="550" y="270" width="180" height="140" rx="10" fill="#fef9e7" stroke="#f4d03f" stroke-width="2"/>
    <text x="640" y="295" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      Fragmentation
    </text>
    <text x="640" y="312" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      Network
    </text>
    
    <!-- Network graph -->
    <circle cx="600" cy="350" r="8" fill="#3498db" stroke="#2c3e50" stroke-width="1"/>
    <circle cx="640" cy="335" r="8" fill="#3498db" stroke="#2c3e50" stroke-width="1"/>
    <circle cx="680" cy="350" r="8" fill="#3498db" stroke="#2c3e50" stroke-width="1"/>
    <circle cx="620" cy="380" r="8" fill="#e74c3c" stroke="#2c3e50" stroke-width="1"/>
    <circle cx="660" cy="380" r="8" fill="#e74c3c" stroke="#2c3e50" stroke-width="1"/>
    
    <!-- Edges -->
    <line x1="600" y1="350" x2="640" y2="335" stroke="#95a5a6" stroke-width="1.5"/>
    <line x1="640" y1="335" x2="680" y2="350" stroke="#95a5a6" stroke-width="1.5"/>
    <line x1="600" y1="350" x2="620" y2="380" stroke="#95a5a6" stroke-width="1.5"/>
    <line x1="640" y1="335" x2="620" y2="380" stroke="#95a5a6" stroke-width="1.5"/>
    <line x1="640" y1="335" x2="660" y2="380" stroke="#95a5a6" stroke-width="1.5"/>
    <line x1="680" y1="350" x2="660" y2="380" stroke="#95a5a6" stroke-width="1.5"/>
  </g>
  
  <!-- Central convergence -->
  <path d="M 240 340 L 290 470" stroke="#95a5a6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 540 340 L 490 470" stroke="#95a5a6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 6: Sequence Reconstruction -->
  <g id="step6">
    <rect x="300" y="450" width="180" height="120" rx="10" fill="#f4ecf7" stroke="#9b59b6" stroke-width="2"/>
    <text x="390" y="480" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      Sequence
    </text>
    <text x="390" y="497" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      Reconstruction
    </text>
    
    <!-- Peptide sequence -->
    <rect x="320" y="510" width="140" height="30" rx="5" fill="#9b59b6" opacity="0.2"/>
    <text x="390" y="530" font-family="Courier New, monospace" font-size="13" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      PEPTIDE
    </text>
    
    <text x="390" y="555" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#27ae60">
      ✓ No database required
    </text>
  </g>
  
  <!-- Key Results Box -->
  <g id="results">
    <rect x="50" y="450" width="180" height="120" rx="10" fill="#ecf0f1" stroke="#34495e" stroke-width="2"/>
    <text x="140" y="475" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      Key Results
    </text>
    
    <text x="140" y="495" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">
      91% hierarchical consistency
    </text>
    <text x="140" y="512" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">
      88.7% PTM localization
    </text>
    <text x="140" y="529" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">
      23× speedup (tri-phos)
    </text>
    <text x="140" y="546" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">
      89.3% zero-shot transfer
    </text>
    <text x="140" y="563" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#27ae60" font-weight="bold">
      Platform Independent
    </text>
  </g>
  
  <!-- Platform Independence Box -->
  <g id="platforms">
    <rect x="550" y="450" width="180" height="120" rx="10" fill="#fdecea" stroke="#e74c3c" stroke-width="2"/>
    <text x="640" y="475" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#2c3e50">
      4 Platforms Tested
    </text>
    
    <text x="640" y="495" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">
      Waters Synapt
    </text>
    <text x="640" y="512" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">
      Thermo Orbitrap
    </text>
    <text x="640" y="529" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">
      Sciex TripleTOF
    </text>
    <text x="640" y="546" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">
      Bruker timsTOF
    </text>
    <text x="640" y="563" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e74c3c" font-weight="bold">
      CV &lt; 2.1%
    </text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#95a5a6"/>
    </marker>
  </defs>
  
</svg>
