<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="250" xmlns="http://www.w3.org/2000/svg">
  
  <rect width="900" height="250" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">
    Partition Framework: From Molecular Structure to Quantitative Predictions
  </text>
  
  <!-- Step 1: Input -->
  <rect x="20" y="50" width="140" height="150" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" rx="8"/>
  <text x="90" y="75" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">INPUT</text>
  <text x="90" y="100" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Molecular</text>
  <text x="90" y="115" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">properties:</text>
  <text x="90" y="135" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">• m/z ratio</text>
  <text x="90" y="150" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">• UV-Vis spectrum</text>
  <text x="90" y="165" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">• Isotope pattern</text>
  <text x="90" y="180" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">• Structure</text>
  
  <!-- Arrow 1 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>
  <line x1="160" y1="125" x2="210" y2="125" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 2: Framework -->
  <rect x="210" y="50" width="180" height="150" fill="#fff3e0" stroke="#e65100" stroke-width="3" rx="8"/>
  <text x="300" y="75" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">PARTITION FRAMEWORK</text>
  <text x="300" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e65100">(n, ℓ, m, s)</text>
  <text x="300" y="130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Coordinate assignment</text>
  <text x="300" y="150" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">μ = τc × g</text>
  <text x="300" y="165" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">c = Δx/τc</text>
  <text x="300" y="180" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">tR = (L/u0) × S</text>
  
  <!-- Arrow 2 -->
  <line x1="390" y1="125" x2="440" y2="125" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 3: Predictions -->
  <rect x="440" y="50" width="180" height="150" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" rx="8"/>
  <text x="530" y="75" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">PREDICTIONS</text>
  <text x="530" y="100" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2e7d32" font-weight="bold">Viscosity: 2% error</text>
  <text x="530" y="120" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2e7d32" font-weight="bold">Retention: 3.2% error</text>
  <text x="530" y="140" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2e7d32" font-weight="bold">Virtual column: 4.1%</text>
  <text x="530" y="160" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2e7d32" font-weight="bold">UV-Vis: 1-6% error</text>
  <text x="530" y="185" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" font-style="italic">No calibration needed</text>
  
  <!-- Arrow 3 -->
  <line x1="620" y1="125" x2="670" y2="125" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 4: Validation -->
  <rect x="670" y="50" width="210" height="150" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" rx="8"/>
  <text x="775" y="75" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">VALIDATION</text>
  <text x="775" y="100" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">✓ HILIC, C18, ion-exchange</text>
  <text x="775" y="120" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">✓ Water, ethanol, glycerol</text>
  <text x="775" y="140" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">✓ Caffeine, adenine, tyrosine</text>
  <text x="775" y="160" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">✓ Cross-domain consistency</text>
  <text x="775" y="185" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" font-weight="bold" fill="#6a1b9a">Three independent domains</text>
  
  <!-- Bottom tagline -->
  <text x="450" y="230" font-family="Arial, sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#666">
    Unified geometric framework: partition operations explain fluids, light, and chromatographic separation
  </text>
  
</svg>
